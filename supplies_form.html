<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>生活用品需求申请 / Necessities Application</title>
<style>
  :root{
    --orange:#e8720c; --orange-d:#b95a09; --ink:#1c2530; --muted:#6b7785;
    --line:#e5e9ee; --bg:#f6f8fa; --card:#fff;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
    color:var(--ink);background:var(--bg);line-height:1.5}
  header{background:linear-gradient(135deg,#e8720c,#b95a09);color:#fff;padding:26px 20px 22px}
  header h1{margin:0 0 4px;font-size:24px;letter-spacing:.3px}
  header p{margin:0;opacity:.92;font-size:13.5px}
  .wrap{max-width:640px;margin:0 auto;padding:0 16px}
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    padding:28px 26px;margin:28px auto;box-shadow:0 2px 10px rgba(20,40,70,.05);
  }
  .field{margin-bottom:20px}
  .field label{display:block;font-size:13.5px;font-weight:650;margin-bottom:8px;color:var(--ink)}
  .field .req{color:var(--orange);margin-left:2px}
  select, textarea{
    width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;
    font-size:14px;font-family:inherit;background:#fff;color:var(--ink);
  }
  select:focus, textarea:focus{outline:none;border-color:var(--orange)}
  textarea{resize:vertical;min-height:80px}
  .house-options{display:flex;flex-wrap:wrap;gap:10px}
  .house-chip{
    border:1.5px solid var(--line);background:#fff;color:var(--muted);
    padding:9px 16px;border-radius:20px;font-size:13.5px;cursor:pointer;
    user-select:none;transition:.15s;
  }
  .house-chip:hover{border-color:var(--orange)}
  .house-chip.active{background:var(--orange);color:#fff;border-color:var(--orange)}
  .submit-btn{
    width:100%;padding:13px;background:var(--orange);color:#fff;border:none;
    border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:.15s;
  }
  .submit-btn:hover{background:var(--orange-d)}
  .submit-btn:disabled{background:#c9ccd1;cursor:not-allowed}
  .status{
    margin-top:16px;padding:12px 14px;border-radius:10px;font-size:13.5px;
    display:none;
  }
  .status.ok{display:block;background:#eaf7ea;color:#1a7a1a;border:1px solid #bfe6bf}
  .status.err{display:block;background:#fdecec;color:#b3261e;border:1px solid #f5c2c0}
  footer{text-align:center;font-size:12px;color:var(--muted);padding:8px 16px 40px}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <h1>生活用品需求申请</h1>
    <p>Necessities Application for CMPak Expats · 提交后直接写入登记表</p>
  </div>
</header>

<div class="wrap">
  <div class="card">
    <form id="supplyForm">
      <div class="field">
        <label>姓名<span class="req">*</span></label>
        <select id="nameSelect" required>
          <option value="" disabled selected>请选择</option>
          <option>Huo Junli</option>
          <option>Wang Yong</option>
          <option>Huang Zhidong</option>
          <option>Mao Weiliang</option>
          <option>Wu Jianhe</option>
          <option>Leng Xing</option>
          <option>Fan Jing</option>
          <option>Zhang Lei</option>
          <option>Jiang Jisuo</option>
          <option>Fan Jiehuan</option>
          <option>Li Xiaowei</option>
          <option>Jing Xiuming</option>
          <option>Yang Chao</option>
          <option>Yan Mingqiang</option>
          <option>Zhao Feilong</option>
          <option>Lu Weidong</option>
          <option>Hu Wenxiao</option>
          <option>Wei Lin</option>
        </select>
      </div>

      <div class="field">
        <label>物品需求<span class="req">*</span></label>
        <textarea id="necessityInput" placeholder="请描述需要的物品，例如：拖把、微波炉、会议室空调故障维修等" required></textarea>
      </div>

      <div class="field">
        <label>所属房屋<span class="req">*</span></label>
        <div class="house-options" id="houseOptions">
          <div class="house-chip" data-v="CEO House">CEO House</div>
          <div class="house-chip" data-v="CTO House">CTO House</div>
          <div class="house-chip" data-v="Expat Kitchen House">Expat Kitchen House</div>
        </div>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">提交申请</button>
      <div class="status" id="statusMsg"></div>
    </form>
  </div>
</div>

<footer>提交时间自动记录为申请日期 · 数据将写入内部登记表</footer>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyDUArzBIbwyMgpZAZ9l-J1AXkhsrhIonyw2nwVaXXBWgAy2IRzs58cVire3y73fXNu/exec";

let selectedHouse = "";
document.querySelectorAll(".house-chip").forEach(chip => {
  chip.addEventListener("click", () => {
    document.querySelectorAll(".house-chip").forEach(c => c.classList.remove("active"));
    chip.classList.add("active");
    selectedHouse = chip.dataset.v;
  });
});

const form = document.getElementById("supplyForm");
const submitBtn = document.getElementById("submitBtn");
const statusMsg = document.getElementById("statusMsg");

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  statusMsg.className = "status";
  statusMsg.textContent = "";

  const name = document.getElementById("nameSelect").value;
  const necessity = document.getElementById("necessityInput").value.trim();

  if (!name || !necessity || !selectedHouse) {
    statusMsg.className = "status err";
    statusMsg.textContent = "请完整填写姓名、物品需求和所属房屋。";
    return;
  }

  if (APPS_SCRIPT_URL.indexOf("PASTE_YOUR") === 0) {
    statusMsg.className = "status err";
    statusMsg.textContent = "表单尚未配置提交地址，请联系管理员。";
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = "提交中…";

  try {
    await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      mode: "no-cors",
      body: new URLSearchParams({ name, necessity, house: selectedHouse }),
    });
    statusMsg.className = "status ok";
    statusMsg.textContent = "提交成功，已记录到登记表。";
    form.reset();
    document.querySelectorAll(".house-chip").forEach(c => c.classList.remove("active"));
    selectedHouse = "";
  } catch (err) {
    statusMsg.className = "status err";
    statusMsg.textContent = "提交失败，请稍后重试或联系管理员。";
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = "提交申请";
  }
});
</script>
</body>
</html>
