name: Monthly PTA dashboard update

on:
  schedule:
    - cron: '7 4 1 * *'   # 1st of each month, 04:07 UTC = 09:07 PKT
  workflow_dispatch: {}    # allow manual run from the Actions tab

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run update script
        run: python3 scripts/update_pta_dashboard.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Monthly data refresh $(date -u +%Y-%m-%d)"
          git push
