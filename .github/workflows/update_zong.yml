name: Bimonthly Zong packages update

on:
  schedule:
    # 每两个月一次：单月（1/3/5/7/9/11月）的 10 日 05:00 UTC = 10:00 PKT
    - cron: '0 5 10 1,3,5,7,9,11 *'
  workflow_dispatch: {}    # 允许在 Actions 页手动触发

permissions:
  contents: write
  issues: write

jobs:
  update-zong:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Zong packages update script
        run: python3 scripts/update_zong_packages.py

      - name: Commit and push if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in zong_packages_index.html scripts/zong_update_log.txt; do
            [ -f "$f" ] && git add "$f"
          done
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "Zong packages refresh $(date -u +%Y-%m-%d)"
            git pull --rebase origin main
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Get date and update log
        if: steps.commit.outputs.changed == 'true'
        id: meta
        run: |
          echo "today=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT
          echo "log<<EOF" >> $GITHUB_OUTPUT
          tail -6 scripts/zong_update_log.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Issue
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Zong 套餐清单已更新 ${{ steps.meta.outputs.today }}" \
            --body "## 本次更新内容

          ${{ steps.meta.outputs.log }}

          ---
          [查看套餐清单](https://huwenxiaocursor.github.io/pta-telecom-dashboard/zong_packages_index.html)"

      - name: Send email notification
        if: steps.commit.outputs.changed == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "Zong 套餐清单已更新 ${{ steps.meta.outputs.today }}"
          to: shawn.hwx@gmail.com
          from: PTA Dashboard <${{ secrets.GMAIL_USERNAME }}>
          body: |
            Zong 套餐清单已于 ${{ steps.meta.outputs.today }} 自动更新（每两个月一次）。

            更新日志：
            ${{ steps.meta.outputs.log }}

            查看清单：https://huwenxiaocursor.github.io/pta-telecom-dashboard/zong_packages_index.html
