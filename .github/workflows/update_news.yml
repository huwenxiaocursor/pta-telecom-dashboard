name: Daily news refresh

on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC = 08:00 PKT, daily
  workflow_dispatch: {}    # allow manual run from the Actions tab

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch news and generate summaries
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python3 scripts/update_news.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html scripts/news_cache.json
          if git diff --cached --quiet; then
            echo "No news changes"
          else
            git commit -m "News refresh $(date -u +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          fi
