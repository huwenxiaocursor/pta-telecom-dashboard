function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlightText(text) {
  if (!text) return '';
  return text.split(/\n\n+/).map(para =>
    '<p>' + esc(para).replace(/【([^】]+)】/g,
      '<span class="key-highlight">$1</span>') + '</p>'
  ).join('');
}

function renderCalendar() {
  const cal = document.getElementById('newsCalendar');

  if (!NEWS_DATA.length) {
    cal.innerHTML = '<div class="no-news">暂无资讯，每日自动抓取更新</div>';
    return;
  }

  // Group by YYYY-MM → DD
  const byMonth = {};
  NEWS_DATA.forEach(item => {
    const ym = item.date.slice(0, 7);
    const dd = item.date.slice(8, 10);
    if (!byMonth[ym]) byMonth[ym] = {};
    if (!byMonth[ym][dd]) byMonth[ym][dd] = [];
    byMonth[ym][dd].push(item);
  });

  const now = new Date();
  const currentYM = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const months = Object.keys(byMonth).sort().reverse();

  months.forEach(ym => {
    const isCurrentMonth = ym === currentYM;
    const [year, month] = ym.split('-');
    const monthLabel = `${year}年${parseInt(month)}月`;
    const dayMap = byMonth[ym];
    const totalItems = Object.values(dayMap).reduce((s, a) => s + a.length, 0);

    const block = document.createElement('div');
    block.className = 'month-block';

    // Month header
    const header = document.createElement('div');
    header.className = 'month-header';
    header.innerHTML = `
      <span class="month-toggle-icon">${isCurrentMonth ? '▼' : '▶'}</span>
      <span>${monthLabel}</span>
      <span class="month-count">${totalItems} 条</span>
      <span class="month-hint">${isCurrentMonth ? '当月' : '点击展开'}</span>
    `;

    // Month content
    const content = document.createElement('div');
    content.className = 'month-content' + (isCurrentMonth ? '' : ' collapsed');

    if (isCurrentMonth) {
      // Show all days from today down to 1st
      for (let d = now.getDate(); d >= 1; d--) {
        const dd = String(d).padStart(2, '0');
        content.appendChild(buildDayRow(dd, month, year, dayMap[dd] || [], true));
      }
    } else {
      // Only show days with news
      Object.keys(dayMap).sort().reverse().forEach(dd => {
        content.appendChild(buildDayRow(dd, month, year, dayMap[dd], false));
      });
    }

    header.addEventListener('click', () => {
      const nowCollapsed = content.classList.toggle('collapsed');
      header.querySelector('.month-toggle-icon').textContent = nowCollapsed ? '▶' : '▼';
      header.querySelector('.month-hint').textContent = nowCollapsed ? '点击展开' : (isCurrentMonth ? '当月' : '');
    });

    block.appendChild(header);
    block.appendChild(content);
    cal.appendChild(block);
  });
}

function buildDayRow(dd, month, year, items, showIfEmpty) {
  const row = document.createElement('div');
  row.className = 'day-row';

  const label = document.createElement('div');
  label.className = 'day-label' + (items.length ? ' has-news' : '');
  label.textContent = `${parseInt(month)}月${parseInt(dd)}日`;
  row.appendChild(label);

  const itemsDiv = document.createElement('div');
  itemsDiv.className = 'day-items';

  if (items.length) {
    items.forEach(item => itemsDiv.appendChild(buildNewsItem(item)));
  } else if (showIfEmpty) {
    const hr = document.createElement('hr');
    hr.className = 'day-divider';
    itemsDiv.appendChild(hr);
  }

  row.appendChild(itemsDiv);
  return row;
}

function buildNewsItem(item) {
  const color = SOURCE_CONFIG[item.source] || '#6b7280';
  const div = document.createElement('div');
  div.className = 'news-item';
  div.style.borderLeftColor = color;
  div.style.setProperty('--source-color', color);
  div.innerHTML = `
    <div class="news-item-header">
      <span class="source-tag" style="background:${color}">${esc(item.source)}</span>
      <a class="news-title" href="${esc(item.url)}" target="_blank" rel="noopener noreferrer">${esc(item.title)}</a>
    </div>
    ${item.summary_zh ? `<div class="news-summary">${highlightText(item.summary_zh)}</div>` : ''}
  `;
  return div;
}

document.getElementById('updateDate').textContent =
  new Date().toLocaleDateString('zh-CN', { year:'numeric', month:'long', day:'numeric' });

renderCalendar();
