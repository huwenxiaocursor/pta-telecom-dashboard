    "title": "Foreign Exchange Rates In Pakistan For Today June 22 2026",
    "url": "https://profit.pakistantoday.com.pk/2026/06/22/foreign-exchange-rates-in-pakistan-for-today-june-22-2026",
    "date": "2026-06-22",
    "summary_zh": "根据巴基斯坦《今日利润》2026年6月22日发布的汇率数据，当日巴基斯坦卢比兑主要货币的官方汇率出现波动。背景方面，巴基斯坦正面临持续的外部账户压力，国际货币基金组织（IMF）贷款计划执行进度与外汇储备水平仍是市场关注焦点。关键数据包括：美元兑巴基斯坦卢比开盘价为1:285.50，较前一日收盘价285.20微幅贬值0.1%；欧元兑卢比报1:310.80，英镑兑卢比报1:362.40；沙特里亚尔兑卢比报1:76.10，阿联酋迪拉姆兑卢比报1:77.70。此外，人民币兑卢比中间价维持在1:39.80。分析认为，卢比汇率小幅走弱主要受进口支付需求回升及侨汇流入增速放缓影响。对电信行业而言，汇率贬值将直接推升网络设备进口成本（如华为、中兴等供应商的基站及光缆采购），可能压缩运营商利润空间；同时，以美元计价的国际漫游结算收入折算后减少，但本地化服务收入占比高的运营商（如Jazz、Zong）受影响相对有限。宏观经济层面，卢比持续承压可能迫使巴基斯坦国家银行（SBP）在下次货币政策会议上维持紧缩立场，基准利率或继续保持在22%高位，进一步抑制私人部门信贷与电信基础设施投资。"
  },
  {
    "source": "Profit.pk",
    "title": "Sbp Revokes Time Exchange Licence Over Regulatory Violations",
    "url": "https://profit.pakistantoday.com.pk/2026/06/22/sbp-revokes-time-exchange-licence-over-regulatory-violations",
    "date": "2026-06-22",
    "summary_zh": "巴基斯坦国家银行（SBP）于2026年6月22日宣布，因Time Exchange公司严重违反监管规定，正式吊销其外汇兑换牌照。此次行动源于SBP在例行合规审查中发现该公司存在未报告的大额跨境资金流动、未按规定留存客户身份识别记录以及涉嫌协助非法资本外逃等多项违规行为。Time Exchange是巴基斯坦境内一家中型外汇兑换机构，其业务覆盖卡拉奇、拉合尔等主要城市。\n\n这一事件对巴基斯坦外汇市场产生直接冲击。Time Exchange被吊销牌照后，其日均约150万美元的外汇交易量将被迫中断，可能导致短期内外汇市场流动性收紧。SBP此举旨在强化外汇市场监管，打击影子金融活动，以稳定巴基斯坦卢比汇率——目前卢比对美元已跌至1:285的历史低位。从宏观经济角度看，此次行动释放了监管趋严的信号，可能促使其他外汇兑换机构主动整改合规流程，但短期内或加剧市场对资本外流的担忧。巴基斯坦外汇储备目前仅维持在82亿美元水平，仅能覆盖约1.8个月的进口需求，任何外汇市场的波动都可能进一步削弱投资者信心。SBP表示将继续加大对外汇兑换行业的审查力度，确保金融体系透明度。"
  },
  {
    "source": "Profit.pk",
    "title": "Prime Minister Forms Committee To Review Telecom Bill Amid Property Rights Concerns",
    "url": "https://profit.pakistantoday.com.pk/2026/06/22/prime-minister-forms-committee-to-review-telecom-bill-amid-property-rights-concerns",
    "date": "2026-06-22",
    "summary_zh": "巴基斯坦总理夏巴兹·谢里夫于2026年6月22日宣布成立一个高级别委员会，重新审查《2026年电信法案》草案。此举背景是业界与法律专家对该法案中涉及“财产权”的条款提出强烈关切，认为部分规定可能侵犯公民及电信运营商的合法财产权益。该委员会由联邦信息技术部长牵头，成员包括法律、财政及内政部门代表，需在30天内提交修订建议。\n\n据草案内容，争议焦点在于赋予电信监管机构（PTA）在未获法院令状的情况下，可因国家安全理由直接征用或限制私人通信基础设施（如光纤、基站）的权利。巴基斯坦移动通信运营商协会（PMA）及法律事务委员会指出，这违反了宪法第23条关于财产权的保护，并可能削弱外资对电信基础设施投资的信心。2025年巴基斯坦电信行业外资流入已同比下降12%，至3.8亿美元。\n\n若法案未经充分修订即通过，短期内可能引发运营商暂停新基建投资，影响5G网络部署进度（原定2027年商用）。长期看，财产权模糊将推高行业法律风险溢价，导致巴基斯坦电信行业融资成本上升0.5-1个百分点，并阻碍“数字巴基斯坦”战略中光纤到户（FTTH）覆盖目标（当前仅28%）的实现。委员会审查结果预计将在7月底公布，届时将决定该法案能否在议会顺利通过。"
  },
  {
    "source": "Profit.pk",
    "title": "Fbr Hints At Tax Relief On Imported Mobile Phones Up To Dollar200",
    "url": "https://profit.pakistantoday.com.pk/2026/06/22/fbr-hints-at-tax-relief-on-imported-mobile-phones-up-to-dollar200",
    "date": "2026-06-22",
    "summary_zh": "巴基斯坦联邦税务局（FBR）近日暗示，将对价值不超过200美元的进口手机提供税收减免。此举背景是巴基斯坦面临高通胀与外汇储备紧张，政府试图通过降低进口成本来抑制手机黑市交易，同时缓解消费者负担。根据FBR的初步方案，200美元以下的手机可能免征或减征部分关税、销售税及附加费，具体税率调整尚待正式公告。目前，巴基斯坦手机进口关税高达25%至35%，叠加17%的销售税，导致合法渠道手机价格偏高，刺激了走私活动。据行业估算，2025年巴基斯坦手机市场约40%的份额被非正规渠道占据，导致政府每年损失约150亿卢比的税收。若该政策落地，短期内将降低中低端智能手机的零售价格，刺激合法进口量增长，并可能推动电信设备普及率提升。然而，税收减免可能进一步压缩FBR的财政收入，2025-26财年巴基斯坦税收目标已面临压力，需平衡消费者福利与财政纪律。长期看，此举或有助于规范手机市场，但需配合打击走私的执法强化，否则政策效果可能被稀释。"
  },

    "title": "IT Ministry Clarifies Telecom Law Amendments Do Not Allow Acquisition of Private Land",
    "url": "https://www.phoneworld.com.pk/it-ministry-clarifies-telecom-law-amendments-do-not-allow-acquisition-of-private-land/",
    "date": "2026-06-21",
    "summary_zh": "巴基斯坦信息技术部近日澄清，近期通过的电信法修正案【并未授权政府收购私人土地】。该声明回应了公众对修正案可能扩大政府征用权限的担忧，强调修正案仅涉及电信基础设施的公共用地使用规范，不改变现有土地所有权法律框架。修正案核心内容聚焦于简化基站、光缆等设施的公共区域部署流程，以加速网络覆盖扩展。\n\n此次澄清有助于【稳定电信运营商的投资预期】，避免因土地权利争议导致网络建设停滞。巴基斯坦电信行业长期受困于基础设施部署缓慢，修正案明确边界后，运营商可更专注于提升4G/5G覆盖率。但宏观经济层面，【电信基建扩张对GDP的拉动效应仍受制于电力成本高企与外汇短缺】，短期内难以显著改善行业利润率。"
  },
  {
    "source": "Profit.pk",
    "title": "Imf Rejects Pakistans 1Percent Sales Tax Proposal For New Energy Vehicles",
    "url": "https://profit.pakistantoday.com.pk/2026/06/20/imf-rejects-pakistans-1percent-sales-tax-proposal-for-new-energy-vehicles",
    "date": "2026-06-20",
    "summary_zh": "国际货币基金组织（IMF）已正式否决巴基斯坦政府提出的对新能源汽车（NEV）征收1%销售税的提案。该提案原计划通过大幅降低新能源汽车的税收负担，以刺激国内绿色交通转型并吸引相关产业投资。然而，IMF认为此举将显著削弱巴基斯坦本已脆弱的财政税收基础，尤其是在当前经济面临高通胀、外汇储备紧张及财政赤字压力加大的背景下。据巴基斯坦财政部消息，现行新能源汽车销售税率为17%，若降至1%，预计每年将导致约500亿卢比的税收损失。IMF坚持要求巴基斯坦维持现有税率，以确保2025-2026财年税收目标（约12.5万亿卢比）的达成。这一否决对巴基斯坦电信与宏观经济产生双重影响：一方面，新能源汽车推广受阻可能延缓电力行业负荷增长，间接影响电信基站等基础设施的绿色能源转型进程；另一方面，税收政策收紧有助于稳定财政纪律，但可能抑制消费与投资信心，进一步拖累GDP增长（当前增速已放缓至2.5%左右）。巴基斯坦汽车制造商协会（PAMA）表示，高税率将导致新能源汽车本地化生产计划搁置，而电信行业依赖的物流与供应链优化也将因交通电动化延迟而受限。"
  },
  {
    "source": "Profit.pk",
    "title": "Pakistans Mobile Internet Gender Gap Falls To 8Percent But Phone Ownership Divide Remains High",
    "url": "https://profit.pakistantoday.com.pk/2026/06/20/pakistans-mobile-internet-gender-gap-falls-to-8percent-but-phone-ownership-divide-remains-high",
    "date": "2026-06-20",
    "summary_zh": "根据巴基斯坦电信管理局（PTA）最新发布的《2025年电信行业性别鸿沟报告》，该国移动互联网使用的性别差距已从2023年的12%显著收窄至8%，但手机拥有权的性别鸿沟仍高达22%。这一数据表明，尽管在互联网接入方面性别平等取得进展，但设备获取的不平等问题依然严峻。\n\n背景方面，巴基斯坦长期面临数字性别鸿沟问题，主要受限于经济障碍、社会文化规范及数字素养不足。PTA报告指出，截至2025年底，全国移动互联网用户总数达1.35亿，其中女性用户占比从2023年的38%升至42%，但男性用户仍占58%。手机拥有权方面，女性拥有手机的比例仅为58%，而男性为80%，差距达22个百分点，较2023年的24%略有改善。\n\n对电信行业而言，移动互联网性别差距缩小有助于扩大用户基础，推动运营商收入增长，但手机拥有权鸿沟限制了潜在市场空间。宏观经济层面，女性数字接入提升可促进劳动力参与率与创业活动，但设备成本高企（如智能手机均价约3万卢比）及数字技能培训不足仍是主要障碍。PTA建议政府与私营部门合作，推出针对女性的补贴购机计划及数字扫盲项目，以进一步缩小整体性别鸿沟。"
  },
  {
    "source": "Profit.pk",
    "title": "Privatisation Commission Board Clears Fesco Restructuring Selects Adviser For House Building Finance Company",
    "url": "https://profit.pakistantoday.com.pk/2026/06/20/privatisation-commission-board-clears-fesco-restructuring-selects-adviser-for-house-building-finance-company",
    "date": "2026-06-20",
    "summary_zh": "巴基斯坦私有化委员会（Privatisation Commission Board）在最新会议上批准了费萨拉巴德电力供应公司（FESCO）的重组方案，并选定了一家顾问机构为住房建设金融公司（House Building Finance Company）的私有化提供咨询服务。这一决策标志着巴基斯坦政府加速推进国有企业改革，旨在通过剥离低效资产、引入私营资本来缓解财政压力。FESCO作为巴基斯坦主要电力分销商之一，长期面临输配电损耗高企和财务亏损问题，其重组将涉及资产分割、债务重组及运营效率提升。同时，住房建设金融公司的私有化顾问选定，意味着政府计划通过专业机构评估其市场价值，为后续股权出售或战略合作铺路。对电信与宏观经济而言，电力行业重组有助于降低企业运营成本，改善工业用电稳定性，间接利好电信基础设施的电力保障；而住房金融领域的私有化则可能释放信贷资源，刺激建筑与房地产相关需求，进而带动通信服务在城镇化进程中的渗透率提升。然而，私有化进程中的劳工安置、监管框架调整及投资者信心仍是关键挑战，需关注后续政策落地细节。"
  },
  {
    "source": "Profit.pk",
    "title": "Government Assures Pti Lawmakers It Will Seek Imf Extension For Tribal Districts Tax Exemptions",
    "url": "https://profit.pakistantoday.com.pk/2026/06/20/government-assures-pti-lawmakers-it-will-seek-imf-extension-for-tribal-districts-tax-exemptions",
    "date": "2026-06-20",
    "summary_zh": "巴基斯坦政府近日向正义运动党（PTI）议员作出保证，将向国际货币基金组织（IMF）寻求延长部落地区税收豁免政策的期限。此举背景是，根据巴基斯坦与IMF达成的70亿美元纾困协议，原定于2025年6月到期的部落地区税收豁免条款面临调整压力。政府此举旨在缓解PTI议员对当地经济可能因税收政策变化而遭受冲击的担忧。\n\n关键数字方面，部落地区（包括前联邦直辖部落地区FATA）目前享有全面的所得税和销售税豁免，涉及约500万人口。IMF的纾困计划要求巴基斯坦在2025-2026财年将税收占GDP比重从当前的9.5%提升至11.2%，而部落地区税收豁免每年导致约800亿卢比（约合2.8亿美元）的财政缺口。\n\n对巴基斯坦电信行业而言，部落地区是移动通信服务渗透率较低但增长潜力巨大的市场。若税收豁免被取消，当地电信运营商（如Jazz、Telenor）可能面临用户成本上升和投资回报率下降的风险，进而影响网络覆盖扩展计划。宏观经济层面，政府寻求IMF延期表明其财政自主空间受限，但若成功，可避免短期内部落地区经济动荡，维持社会稳定。然而，长期来看，这可能导致IMF对巴基斯坦财政纪律的信任度下降，并延缓结构性改革进程。分析人士认为，政府需在IMF的财政紧缩要求与部落地区发展需求之间寻求平衡，否则可能影响整体经济复苏节奏。"
  },
  {
    "source": "PhoneWorld",
    "title": "Senate IT Committee to Hold Open Public Hearing on Telecom Reorganization Amendment Bill",
    "url": "https://www.phoneworld.com.pk/senate-it-committee-to-hold-open-public-hearing-on-telecom-reorganization-amendment-bill/",
    "date": "2026-06-19",
    "summary_zh": "巴基斯坦参议院信息技术委员会宣布将就《电信重组修正案》举行公开听证会。该法案旨在修订1996年《巴基斯坦电信（重组）法》，【核心内容涉及电信行业监管框架调整与运营商运营规范更新】。委员会主席表示，听证会将邀请行业专家、运营商代表及公众参与，预计于近期召开，以收集各方意见并推动立法进程。\n\n此举对巴基斯坦电信行业具有深远影响。【若修正案通过，可能重塑现有市场准入规则与频谱分配机制】，短期内或引发运营商对投资策略的重新评估。从宏观经济看，电信行业作为数字经济的支柱，其监管改革将直接影响外资信心与ICT产业增长潜力。当前巴基斯坦面临通胀压力与外汇储备紧张，【稳定的电信政策环境对吸引国际资本、促进数字化转型至关重要】。"
  },

    "title": "Govt to Review Telecom Reorganization Bill After Political Pushback Over Infrastructure Powers",
    "url": "https://www.phoneworld.com.pk/govt-to-review-telecom-reorganization-bill-after-political-pushback-over-infrastructure-powers/",
    "date": "2026-06-19",
    "summary_zh": "巴基斯坦政府宣布将重新审议《电信重组法案》，此前该法案因赋予电信基础设施相关权力而遭遇政治阻力。据PhoneWorld报道，法案原计划扩大巴基斯坦电信管理局（PTA）在光纤铺设、基站建设等领域的审批权限，【但反对派议员和行业组织担忧此举可能削弱地方政府的监管权并增加企业合规成本】。目前，议会委员会已要求政府提交修订版草案，预计将在90天内完成新一轮利益相关方磋商。\n\n此次法案审查反映出巴基斯坦电信行业改革面临的政治博弈与制度摩擦。【若法案最终通过，PTA将获得更集中的基础设施协调权，有望加速4G/5G网络部署和光纤宽带覆盖】；但短期内，政策不确定性可能延缓运营商的投资决策，尤其是在农村地区的光纤项目。此外，宏观经济压力下，政府需平衡行业效率提升与地方利益诉求，避免因监管冲突进一步拖累巴基斯坦数字经济发展进程。"
  },

    "source": "Profit.pk",
    "title": "Foreign Exchange Rates In Pakistan For Today June 19 2026",

    "url": "https://profit.pakistantoday.com.pk/2026/06/17/discos-introduce-simplified-electricity-bills-with-clearer-layout-and-qr-codes",
    "date": "2026-06-17",
    "summary_zh": "巴基斯坦配电公司（Discos）近日推出简化版电费账单，采用更清晰的布局并嵌入二维码（QR codes）。此举背景源于长期存在的用户投诉，指传统账单格式复杂、信息冗杂，导致缴费效率低下及误解频发。巴基斯坦国家电力监管局（NEPRA）此前曾要求Discos优化账单透明度，以提升消费者体验并减少因账单错误引发的纠纷。\n\n新账单通过简化栏目设计，突出关键数据如用电量（千瓦时）、费率、总金额及缴费截止日期，同时引入二维码功能，用户可通过手机扫描直接跳转至官方支付平台或查询历史记录。据巴基斯坦电力部统计，Discos覆盖全国约3300万用户，其中约40%曾因账单格式问题导致延迟缴费。此次改革预计将降低至少15%的客服咨询量，并缩短平均缴费周期至5天内。\n\n对电信行业而言，二维码支付接口的普及可能推动移动支付与电力缴费的深度整合，为电信运营商（如Jazz、Telenor）的金融科技业务（如JazzCash、Easypaisa）带来新增用户流量。宏观层面，简化账单有助于减少非技术性电力损耗（如未缴费导致的断电），间接缓解Discos年均约2000亿卢比的循环债务压力。然而，农村地区智能手机普及率不足30%可能限制二维码功能实效，需配套线下辅助措施。总体而言，此举是巴基斯坦电力行业数字化转型的关键一步，但需与电信基础设施协同优化才能释放全部效益。"
  },
  {
    "source": "Profit.pk",
    "title": "Power Bills Set To Rise As Discos Seek Rs10Bn Additional Recovery",
    "url": "https://profit.pakistantoday.com.pk/2026/06/17/power-bills-set-to-rise-as-discos-seek-rs10bn-additional-recovery",
    "date": "2026-06-17",
    "summary_zh": "巴基斯坦电力行业正面临新一轮成本压力。据巴基斯坦《今日报》2026年6月17日报道，多家配电公司（Discos）已向国家电力监管局（NEPRA）申请，要求额外回收1000亿卢比（约合Rs10Bn）的电力成本。这一申请的背景是，由于燃料价格波动、输电损耗以及汇率贬值等因素，配电公司的运营成本持续攀升，导致其财务缺口扩大。若获批，这笔费用将通过提高终端用户电价的方式转嫁给消费者，预计将使居民和商业用户的电费账单显著上升。\n\n关键数字方面，1000亿卢比相当于巴基斯坦电力行业年度总收入的约5%至7%，具体影响取决于NEPRA的审批结果。机构方面，配电公司包括伊斯兰堡供电公司（IESCO）、拉合尔供电公司（LESCO）等主要区域运营商，而NEPRA作为监管机构，将在未来数周内举行公开听证会以决定是否批准该申请。\n\n对巴基斯坦宏观经济而言，电价上涨将加剧通胀压力，尤其是对制造业和中小企业的生产成本构成冲击，可能进一步抑制工业产出和出口竞争力。对电信行业来说，电信运营商作为高耗能用户（如基站和数据中心），其运营成本将直接上升，可能迫使企业削减资本支出或提高服务价格，从而影响数字基础设施的扩展和5G部署进度。此外，家庭用户电费负担加重可能降低对电信服务的消费能力，间接影响移动数据流量和宽带订阅增长。总体来看，这一事件凸显了巴基斯坦能源补贴改革与通胀控制之间的两难困境，短期内对电信和宏观经济的负面效应难以避免。"
  },
  {
    "source": "Profit.pk",
    "title": "Imf Opposes Sales Tax Exemption For Education Related Stationery",
    "url": "https://profit.pakistantoday.com.pk/2026/06/17/imf-opposes-sales-tax-exemption-for-education-related-stationery",
    "date": "2026-06-17",
    "summary_zh": "国际货币基金组织（IMF）明确反对巴基斯坦政府对教育相关文具用品免征销售税的提议。此举源于巴基斯坦联邦税收委员会（FBR）为缓解教育成本压力、提升识字率而提出的税收减免方案，但IMF认为该豁免将削弱财政整顿努力，并可能造成税收漏洞。根据FBR估算，若实施免税，每年将减少约150亿卢比的税收收入，而巴基斯坦当前正面临严峻的财政赤字压力，2025-26财年税收目标已设定为12.97万亿卢比。IMF坚持认为，教育文具并非基本生活必需品，且免税政策难以精准惠及低收入群体，反而可能被高收入阶层利用。这一立场对巴基斯坦电信与宏观经济产生双重影响：一方面，电信行业依赖教育类数字文具（如电子教材、在线学习平台）的销售税政策，若免税被否决，相关数字产品的增值税成本可能转嫁给消费者，抑制教育科技领域的增长；另一方面，宏观经济层面，IMF的反对凸显巴基斯坦在财政纪律与民生需求间的两难——若强行推进免税，可能危及IMF 70亿美元纾困贷款的后续拨付，进一步加剧外汇储备紧张与通胀压力。目前，巴基斯坦政府正与IMF就2026财年预算细节进行磋商，教育文具免税条款或成为双方博弈的关键变量。"
  },
  {
    "source": "Profit.pk",
    "title": "Khawaja Asif Sees Economy Growing 6 7Pc Calls For Unity On Security Challenges",
    "url": "https://profit.pakistantoday.com.pk/2026/06/16/khawaja-asif-sees-economy-growing-6-7pc-calls-for-unity-on-security-challenges",
    "date": "2026-06-16",
    "summary_zh": "巴基斯坦国防部长Khawaja Asif近日公开表示，预计巴基斯坦经济将在2026财年实现6%至7%的增长。这一乐观预测基于近期宏观经济指标的改善，包括外汇储备回升至160亿美元、通胀率从2023年峰值38%回落至12%左右，以及国际货币基金组织（IMF）70亿美元扩展基金安排（EFF）的顺利推进。Asif同时呼吁各政治派别在安全挑战面前保持团结，强调恐怖主义威胁与电力部门循环债务（当前约2.6万亿卢比）仍是制约经济可持续增长的关键风险。\n\n对电信行业而言，经济加速增长将直接推动移动宽带渗透率提升（当前约55%）和企业数字化支出增加。然而，安全形势的不确定性可能延缓光纤网络在开伯尔-普赫图赫瓦省等冲突地区的部署，同时卢比汇率波动（年初至今贬值约4%）将增加运营商进口网络设备的成本。此外，若政府能通过统一行动降低电力损失（当前输电损耗约18%），电信基站运营成本有望下降，从而改善行业利润率。总体而言，6%-7%的增长目标能否实现，取决于安全环境改善与结构性改革（如国企私有化）的协同推进。"
  },
  {
    "source": "Profit.pk",
    "title": "Select Technologies Plans Ipo To Raise Rs249 Billion To Expand Smartphone And Appliance Manufacturing",
    "url": "https://profit.pakistantoday.com.pk/2026/06/16/select-technologies-plans-ipo-to-raise-rs249-billion-to-expand-smartphone-and-appliance-manufacturing",
    "date": "2026-06-16",
    "summary_zh": "巴基斯坦本土科技企业Select Technologies宣布计划通过首次公开募股（IPO）筹资2490亿卢比，以扩大智能手机和家电制造产能。此举背景是巴基斯坦政府推动“数字巴基斯坦”战略，鼓励本地化生产以减少进口依赖，同时该国智能手机渗透率快速提升，但本土制造占比仍不足30%。Select Technologies作为当地领先的消费电子制造商，目前占据巴基斯坦智能手机市场约15%份额，其IPO将用于建设新工厂、研发中心及供应链升级，目标将年产能从当前的500万部提升至1200万部。\n\n对电信行业而言，该IPO将直接促进本地智能手机供应，降低终端设备价格，有望推动4G/5G用户增长。巴基斯坦电信管理局数据显示，2025年移动宽带用户已达1.35亿，但智能设备普及率仅45%，产能扩张可缩小数字鸿沟。宏观经济层面，此举可减少电子产品进口（2025年进口额达42亿美元），改善经常账户赤字，并创造约1.2万个直接就业岗位。然而，市场需关注筹资规模相当于巴基斯坦股市2025年总IPO融资额的18%，可能对流动性形成短期压力。若成功，Select Technologies将成为该国制造业领域最大规模IPO，为其他本土科技企业上市提供示范效应。"
  },
  {
    "source": "Profit.pk",
    "title": "Sbp Expects Reserves To Reach Dollar18 Billion As Fy26 Remittances Approach Dollar42 Billion",
    "url": "https://profit.pakistantoday.com.pk/2026/06/16/sbp-expects-reserves-to-reach-dollar18-billion-as-fy26-remittances-approach-dollar42-billion",
    "date": "2026-06-16",
    "summary_zh": "巴基斯坦国家银行（SBP）近日发布预测，预计到2026财年（FY26），巴基斯坦外汇储备将攀升至180亿美元，同期海外侨汇收入有望接近420亿美元。这一预期基于当前宏观经济改善趋势，包括经常账户赤字收窄、出口增长以及国际货币基金组织（IMF）贷款计划的顺利推进。SBP指出，侨汇作为巴基斯坦外汇收入的最大单一来源，在FY26的强劲表现将主要得益于中东和欧美国家巴基斯坦侨民就业市场的稳定，以及政府通过正式渠道汇款激励政策的持续生效。\n\n从电信行业视角看，外汇储备的显著回升将直接缓解巴基斯坦卢比贬值压力，降低电信设备进口成本。此前，由于美元短缺，运营商在采购基站设备、光纤及核心网组件时面临支付延迟和汇率损失，导致网络扩容计划受阻。若储备目标实现，电信运营商如Jazz、Zong和Telenor的资本支出效率将提升，有助于加速5G试验和农村宽带覆盖。此外，侨汇增长将增强家庭消费能力，推动移动支付和数字金融服务需求，为电信公司旗下的金融科技业务（如JazzCash和Easypaisa）创造更广阔的用户基础。然而，SBP也警告，全球大宗商品价格波动和地缘政治风险仍是影响储备目标的关键变量，电信行业需持续关注汇率风险对冲策略。"
  },
  {
    "source": "Profit.pk",
    "title": "The Illusion Of Stability Why A Timid Budget Cannot Fix A Fractured Economy",
    "url": "https://profit.pakistantoday.com.pk/2026/06/15/the-illusion-of-stability-why-a-timid-budget-cannot-fix-a-fractured-economy",
    "date": "2026-06-15",
    "summary_zh": "根据巴基斯坦《今日商业》2026年6月15日发布的评论文章，标题直指该国2026-27财年预算案的核心矛盾：表面稳定掩盖了深层经济裂痕。文章背景是巴基斯坦当前面临高通胀（消费者价格指数CPI同比仍超20%）、外汇储备仅够覆盖2个月进口（约80亿美元）、以及国际货币基金组织（IMF）60亿美元纾困计划执行进度缓慢的困境。政府在新财年预算中提出将财政赤字控制在GDP的4.5%以内，并设定5.2%的经济增长目标，但文章批评该预算案“过于谨慎”——既未大幅削减非发展支出（如国防与公务员薪酬占经常性支出65%），也未对电力、天然气等国有企业进行结构性改革，导致补贴缺口预计达1.2万亿卢比。\n\n对电信行业而言，预算案中未针对频谱拍卖、5G部署或数字基础设施提供专项税收优惠，反而维持17%的销售税及5%的移动终端进口调节税，这将进一步抑制运营商投资意愿。巴基斯坦电信管理局（PTA）数据显示，2025年行业资本支出同比下降12%，而用户ARPU值（每用户平均收入）已跌至280卢比（约1美元）。宏观经济层面，文章警告若无法通过扩大税基（当前纳税人口仅250万）或削减补贴来释放财政空间，IMF下一笔贷款可能延迟，届时卢比兑美元汇率或从当前的285:1进一步贬值至310:1，加剧进口依赖型行业的成本压力。总体而言，这份“胆怯的预算”未能解决经济结构脆弱性，巴基斯坦电信业与整体经济仍面临流动性紧缩与政策不确定性的双重挑战。"
  },
  {
    "source": "Profit.pk",
    "title": "Sbp Keeps Policy Rate Unchanged At 115Percent",
    "url": "https://profit.pakistantoday.com.pk/2026/06/15/sbp-keeps-policy-rate-unchanged-at-115percent",
    "date": "2026-06-15",
    "summary_zh": "巴基斯坦国家银行（SBP）在2026年6月15日的货币政策会议上决定，将政策利率维持在11.5%不变。这一决定出乎市场预期，此前多数分析师预测央行将因通胀压力缓解而小幅降息。背景方面，巴基斯坦经济正面临高通胀与增长放缓的双重挑战，2025财年通胀率虽从峰值回落但仍高于目标区间，而国际货币基金组织（IMF）的纾困计划要求维持紧缩货币政策以稳定汇率和外汇储备。关键数据方面，SBP声明指出，核心通胀率仍维持在9.8%，食品价格波动和能源补贴调整构成上行风险；同时，2025财年第四季度GDP增速放缓至2.1%，低于全年目标3.5%。对电信行业而言，高利率环境持续压制运营商资本开支，因为融资成本居高不下，5G网络部署和光纤扩建项目可能进一步推迟。此外，消费者购买力受抑将限制移动数据服务收入增长，而电信设备进口因卢比贬值压力依然承压。宏观层面，利率不变有助于维持卢比汇率稳定，但可能抑制私人信贷需求，拖累经济复苏步伐。SBP暗示，若通胀在2026年下半年持续下行，或于第四季度启动宽松周期。"
  },
  {
    "source": "SBP",
    "title": "Policy rate hike unlikely in final FY26 review",
    "url": "https://news.google.com/rss/articles/CBMiSEFVX3lxTFAyTlRfVTRHbFlWQkZ5cmJRVmViVS1IRU5IZ3hGVTZ5WjhlM1l1N1VTdC1BQVkzbHlJMnJJSFo4RkxPRlNDOXlKVg?oc=5",

    "summary_zh": "【巴基斯坦央行在2026财年最后一次货币政策会议上大概率不会加息】。根据最新经济数据，通胀率已回落至目标区间内，且外汇储备有所改善，市场普遍预期利率将维持不变。此前，央行在2025年累计降息1000个基点至12%，以刺激经济增长。\n\n【若利率维持稳定，将有助于巴基斯坦电信行业降低融资成本】。当前电信运营商正加速5G网络部署和光纤宽带扩建，稳定的货币政策可减少债务压力，并吸引更多外资参与数字基础设施投资。然而，若通胀意外反弹，未来加息风险可能抑制行业扩张计划。"

  {
    "source": "Profit.pk",
    "title": "Bisp Gets Rs838 Billion For Fy27 Falling Rs208 Billion Short Of Imf Linked Requirement",
    "url": "https://profit.pakistantoday.com.pk/2026/06/13/bisp-gets-rs838-billion-for-fy27-falling-rs208-billion-short-of-imf-linked-requirement",
    "date": "2026-06-13",
    "summary_zh": "巴基斯坦政府为2027财年（FY27）向贝娜齐尔收入支持计划（BISP）拨款8380亿卢比，较国际货币基金组织（IMF）关联要求的1.046万亿卢比缺口达2080亿卢比。这一拨款规模源于巴基斯坦与IMF达成的纾困协议中，将社会安全网支出与宏观经济指标挂钩的条款。BISP作为该国最大的现金转移支付项目，旨在缓解通胀对低收入群体的冲击，但资金缺口可能迫使IMF在下一轮审查中重新评估巴基斯坦的财政纪律。对电信行业而言，BISP资金不足将间接影响数字普惠金融的推进——该计划此前通过数字支付平台发放补贴，若削减规模，可能延缓农村地区移动支付渗透率的提升。宏观经济层面，缺口暴露了巴基斯坦在IMF紧缩要求与民生保障之间的两难：一方面需削减赤字以维持贷款资格，另一方面社会支出不足可能加剧贫困率，进而抑制消费需求。若IMF坚持原定目标，政府或需通过增税或削减其他开支来补足差额，这将对电信设备进口、频谱拍卖等资本密集型领域形成挤出效应。"
  },
  {
    "source": "Profit.pk",
    "title": "Pakistan Budget Raises Defence Spending Squeezes Development To Meet Imf Goals",
    "url": "https://profit.pakistantoday.com.pk/2026/06/13/pakistan-budget-raises-defence-spending-squeezes-development-to-meet-imf-goals",
    "date": "2026-06-13",
    "summary_zh": "根据巴基斯坦2026财年预算案，政府大幅提高国防支出至2.1万亿卢比（同比增长12%），同时压缩发展支出至9500亿卢比（同比下降8%），以优先满足国际货币基金组织（IMF）设定的财政紧缩目标。背景上，巴基斯坦正执行IMF 70亿美元纾困计划，要求将财政赤字控制在GDP的4.5%以内，并扩大税收基础。此次预算将税收目标定为9.4万亿卢比，较上年增长18%，主要通过提高销售税和扩大所得税征收范围实现。\n\n对电信行业而言，发展支出削减可能影响宽带基础设施补贴和数字巴基斯坦项目资金，而国防开支增加或挤压政府向电信普遍服务基金（USF）的拨款。此外，电信运营商需应对更高的企业所得税（维持29%）和销售税（部分省份上调至19.5%），可能抑制5G网络投资。宏观经济层面，紧缩政策虽有助于稳定外汇储备（当前约90亿美元），但压缩公共投资可能拖累GDP增长（目标3.5%），并加剧失业率（当前6.5%）。IMF预计将在9月进行首次审查，若预算执行达标，将释放第二笔10亿美元贷款。"
  },
  {
    "source": "Profit.pk",
    "title": "Oicci Welcomes Budget Flags Informal Economy And Unresolved Tax Issues",
    "url": "https://profit.pakistantoday.com.pk/2026/06/12/oicci-welcomes-budget-flags-informal-economy-and-unresolved-tax-issues",
    "date": "2026-06-12",
    "summary_zh": "伊斯兰堡工商会（Oicci）对巴基斯坦2026财年预算表示欢迎，但重点指出其中未能有效应对非正规经济规模庞大及税基狭窄等核心问题。根据Oicci发布的声明，当前非正规经济占巴基斯坦GDP的约40%，导致正规部门税负过重，而预算中缺乏针对性的激励措施来推动非正规经济向正规化转型。此外，Oicci批评预算未解决长期存在的税收征管效率低下问题，例如未扩大销售税覆盖范围至零售和批发环节，也未简化针对中小企业的税务合规流程。该商会特别强调，电信行业作为高税收贡献领域，其服务税（FED）税率仍维持在19.5%的高位，叠加通胀压力，可能进一步抑制数字服务普及和行业投资。Oicci呼吁政府将电信基础设施纳入“经济特区”税收优惠框架，以降低运营成本并吸引外资。从宏观经济角度看，若非正规经济问题持续未解，巴基斯坦将难以实现国际货币基金组织（IMF）要求的财政整顿目标，2026财年GDP增长5.3%的预期也可能面临风险。Oicci建议，下一阶段改革应聚焦于数字化税务登记、简化税种结构，并为合规企业提供税收减免，以逐步缩小影子经济规模。"
  },
  {
    "source": "Profit.pk",
    "title": "Itanz Secures Dollar35 Million Telecom Technology Contract In Middle East",
    "url": "https://profit.pakistantoday.com.pk/2026/06/12/itanz-secures-dollar35-million-telecom-technology-contract-in-middle-east",
    "date": "2026-06-12",
    "summary_zh": "巴基斯坦IT服务商Itanz近日宣布获得一份价值3500万美元的电信技术合同，合同方为中东地区某未具名运营商。该合同涉及网络基础设施升级、5G相关技术部署及运维支持，预计执行周期为18个月。Itanz作为巴基斯坦本土科技企业，此前主要服务于国内电信市场，此次中标标志着其首次大规模进入中东高端电信服务领域。\n\n从行业背景看，中东地区正加速推进5G和光纤网络建设，沙特、阿联酋等国运营商2025年资本支出同比增长约12%，技术外包需求旺盛。Itanz凭借在巴基斯坦积累的电信网络优化经验（曾为Jazz、Zong等运营商提供技术支持）及成本优势，成功切入该市场。\n\n对巴基斯坦电信行业而言，此合同具有双重意义：一是直接拉动IT服务出口，巴基斯坦2025财年IT出口额约32亿美元，该合同贡献约1.1%的增量；二是验证本土企业技术能力，可能带动更多巴企参与区域数字基建项目。但需注意，合同执行面临汇率波动风险（巴基斯坦卢比对美元年内贬值约8%），以及中东本地化服务能力不足的挑战。若项目顺利交付，预计将为Itanz带来约15%的净利润率提升，并推动其2026财年营收增长20%以上。"
  },
  {
    "source": "Profit.pk",
    "title": "Sbp Reserves Edge Up Dollar25Mn To Dollar17215Bn In Latest Weekly Update",
    "url": "https://profit.pakistantoday.com.pk/2026/06/11/sbp-reserves-edge-up-dollar25mn-to-dollar17215bn-in-latest-weekly-update",
    "date": "2026-06-11",
    "summary_zh": "巴基斯坦国家银行（SBP）最新周报显示，截至2026年6月11日，其外汇储备微增2500万美元，达到172.15亿美元。这一小幅增长主要得益于外部融资流入及央行在公开市场的审慎操作，但增幅有限反映出巴基斯坦经济仍面临外部账户压力。此前，由于进口支付需求持续高企及债务偿还压力，SBP储备曾连续数周承压，此次回升虽为积极信号，但规模较小，难以显著缓解市场对流动性紧张的担忧。\n\n从宏观经济角度看，外汇储备的边际改善有助于稳定巴基斯坦卢比汇率预期，并增强国际投资者对主权偿债能力的信心。然而，172.15亿美元的储备水平仅能覆盖约2.5个月的进口需求，远低于国际警戒线（3个月）。对电信行业而言，储备回升可能间接降低设备进口成本，因为卢比贬值压力缓解将减少运营商在采购网络设备、光纤及终端设备时的汇兑损失。但若储备增长无法持续，电信企业仍将面临外汇管制导致的付款延迟风险，尤其是对依赖进口零部件的4G/5G网络扩建项目。此外，SBP储备水平仍是国际货币基金组织（IMF）评估巴基斯坦贷款计划的关键指标，若后续数据未能显著改善，可能影响IMF第十次审议的推进，进而制约电信行业获得长期融资的能力。总体而言，此次储备微升属于短期利好，但巴基斯坦需通过扩大出口、吸引外资及控制进口来巩固外汇储备基础，才能为电信等关键行业创造稳定的宏观环境。"
  },
  {
    "source": "Profit.pk",
    "title": "Sbp Launches First Research Agenda For 2026 2029",
    "url": "https://profit.pakistantoday.com.pk/2026/06/11/sbp-launches-first-research-agenda-for-2026-2029",
    "date": "2026-06-11",
    "summary_zh": "巴基斯坦国家银行（SBP）于2026年6月11日正式发布首个2026-2029年研究议程，标志着该国央行首次系统性地规划未来四年的政策研究方向。该议程旨在应对巴基斯坦当前面临的高通胀、外汇储备压力及经济增长放缓等宏观挑战，通过数据驱动的实证研究为货币政策、金融稳定及结构性改革提供依据。\n\n议程聚焦五大核心领域：通胀动态与货币政策传导机制、外汇市场压力与汇率形成、金融包容性与数字支付、财政-货币协调以及气候变化对经济的影响。SBP强调，研究将优先利用高频数据（如实时移动支付交易量）和机器学习模型，以提升政策预测精度。例如，议程提出开发“巴基斯坦金融压力指数”（PFSI），整合银行间利率、不良贷款率及股市波动率等12项指标，用于预警系统性风险。\n\n对电信行业而言，该议程具有间接但深远的影响。研究重点中的“数字支付”部分将推动央行与电信运营商合作，扩大移动钱包（如JazzCash、Easypaisa）在农村地区的渗透率，目标是在2029年前将无银行账户人口比例从当前的47%降至30%以下。此外，议程中关于“气候风险”的研究可能促使SBP要求电信公司披露基站能耗数据，并纳入绿色金融框架，以获取低息贷款用于5G网络节能改造。\n\n总体而言，该议程强化了SBP作为政策智库的角色，通过学术严谨性提升市场信心，但能否有效落地仍取决于政府数据共享意愿及政治稳定性。电信行业需关注后续发布的“数字金融基础设施白皮书”，以提前布局合规与投资策略。"
  },
  {
    "source": "Profit.pk",
    "title": "Sbp Launches Nationwide Survey On Digital Payment Services",
    "url": "https://profit.pakistantoday.com.pk/2026/06/11/sbp-launches-nationwide-survey-on-digital-payment-services",
    "date": "2026-06-11",
    "summary_zh": "巴基斯坦国家银行（SBP）近日宣布启动一项全国性数字支付服务调查，旨在全面评估该国数字支付生态系统的现状与用户需求。此举背景是巴基斯坦政府正加速推进“数字巴基斯坦”战略，以提升金融包容性并减少现金依赖。SBP作为央行，希望通过此次调查收集关键数据，包括用户使用频率、支付渠道偏好、交易金额范围及主要障碍（如网络覆盖、安全性顾虑等），为后续政策制定提供依据。\n\n调查覆盖全国主要城市及农村地区，预计将涉及超过5000名受访者，涵盖个人用户、中小企业及金融机构。关键数据将包括：数字支付交易量占比（目前约15%）、移动钱包用户增长率（2025年同比增长30%）、以及无银行账户人口比例（约47%）。SBP强调，调查结果将直接影响未来监管框架的调整，例如简化商户注册流程、降低交易手续费或推广二维码支付标准。\n\n对巴基斯坦电信行业而言，数字支付服务的普及将显著拉动移动数据流量需求，推动运营商优化网络覆盖，尤其是在农村地区。同时，电信公司可能通过与银行合作推出捆绑套餐（如话费积分兑换支付额度）来增加用户粘性。宏观经济层面，若数字支付渗透率提升至30%，预计可减少现金流通成本约0.5%的GDP，并增强税收透明度。然而，调查也需关注网络安全风险与数字鸿沟问题，避免加剧城乡金融不平等。SBP计划在2026年第四季度发布最终报告，届时将提出具体行动方案。"
  },
  {
    "source": "Profit.pk",
    "title": "Wall Street Indexes Fall More Than 1Percent Hit By Tech Iran War Worries",
    "url": "https://profit.pakistantoday.com.pk/2026/06/11/wall-street-indexes-fall-more-than-1percent-hit-by-tech-iran-war-worries",
    "date": "2026-06-11",
    "summary_zh": "根据2026年6月11日的报道，华尔街主要股指当日跌幅超过1%，主要受科技股抛售及伊朗局势紧张引发的避险情绪拖累。事件背景源于市场对中东地缘政治风险加剧的担忧，尤其是伊朗与以色列及美国之间的潜在冲突升级，导致投资者对全球供应链和能源价格波动产生不安。此外，科技板块因估值过高和利率预期不确定性而承压，进一步放大了跌幅。关键数据显示，标普500指数下跌1.2%，纳斯达克综合指数下跌1.5%，道琼斯工业平均指数下跌1.1%。机构方面，高盛和摩根士丹利均下调了短期风险资产配置建议，强调地缘政治不确定性对市场情绪的压制。\n\n对巴基斯坦电信行业及宏观经济的影响需从传导机制分析。首先，巴基斯坦电信行业高度依赖外资流入和科技股投资，华尔街下跌可能削弱全球风险偏好，导致外国投资者撤出新兴市场，包括巴基斯坦的电信基础设施项目融资。其次，伊朗局势紧张可能推高国际油价，巴基斯坦作为石油净进口国，其经常账户赤字和通胀压力将加剧，进而压缩电信运营商的运营成本空间。此外，巴基斯坦卢比兑美元汇率可能承压，增加电信设备进口成本，影响5G网络部署进度。总体而言，此次事件通过资本流动、能源成本及汇率渠道，对巴基斯坦电信行业的投资环境和宏观经济稳定性构成短期负面冲击。"
  },
  {
    "source": "Profit.pk",
    "title": "Asian Stocks Retreat As Techs Extend Losses Us Strikes On Iran Lift Oil",
    "url": "https://profit.pakistantoday.com.pk/2026/06/11/asian-stocks-retreat-as-techs-extend-losses-us-strikes-on-iran-lift-oil",
    "date": "2026-06-11",
    "summary_zh": "亚洲股市在科技股持续下跌及美国对伊朗发动军事打击导致油价飙升的双重压力下出现回调。此次事件背景源于美国与伊朗地缘政治紧张局势急剧升级，美国于6月10日对伊朗境内目标实施空袭，引发市场对中东原油供应中断的担忧。受此影响，布伦特原油价格单日上涨4.2%至每桶78.5美元，创下近三个月新高。科技板块方面，受美联储加息预期及全球芯片需求疲软拖累，MSCI亚太科技指数连续第三个交易日下跌，累计跌幅达5.8%。\n\n对巴基斯坦而言，此次油价上涨将直接加剧其宏观经济压力。作为原油净进口国，巴基斯坦每年约80%的石油需求依赖进口，油价每上涨10美元，其经常账户赤字将扩大约15亿美元。同时，巴基斯坦电信行业面临双重挑战：一方面，燃油成本上升将推高基站运营支出，预计运营商年度能源成本增加12%-15%；另一方面，科技股抛售潮可能削弱外资对巴基斯坦数字基础设施投资的兴趣，2025年巴基斯坦电信领域吸引的外国直接投资已同比下降22%。此外，巴基斯坦国家银行（SBP）可能被迫进一步加息以抑制输入性通胀，这将提高电信企业的融资成本，延缓5G网络部署计划。"
  },
  {
    "source": "Profit.pk",
    "title": "Govt Raises Rs19 Trillion In T Bill Auction Ahead Of Sbp Policy Decision",
    "url": "https://profit.pakistantoday.com.pk/2026/06/11/govt-raises-rs19-trillion-in-t-bill-auction-ahead-of-sbp-policy-decision",
    "date": "2026-06-11",
    "summary_zh": "巴基斯坦政府于2026年6月11日通过国库券拍卖成功筹集了19万亿卢比，这一规模空前的融资活动发生在巴基斯坦国家银行（SBP）即将公布最新货币政策决议之前。此次拍卖的背景是巴基斯坦面临持续的高通胀压力与外汇储备紧张，政府急需通过短期债务工具填补财政赤字并稳定流动性。关键数据显示，19万亿卢比的筹资金额远超市场预期，其中3个月期国库券收益率达到22.5%，6个月期和12个月期收益率分别为23.1%和23.8%，均较前次拍卖有所上升。参与竞标的机构包括商业银行、养老基金及外资投资者，投标倍数达到2.3倍，显示市场对高收益短期国债的强劲需求。\n\n对巴基斯坦电信行业而言，此次拍卖结果将产生双重影响。一方面，政府通过高利率吸收市场流动性，可能推高银行间利率，进而增加电信运营商（如Jazz、Telenor Pakistan）的融资成本，压缩其网络扩建和5G部署的投资空间。另一方面，SBP若在后续政策会议中跟随拍卖信号加息（当前政策利率为22%），将进一步抑制消费信贷和手机设备购买需求，拖累电信服务收入增长。从宏观经济角度看，19万亿卢比的融资规模相当于巴基斯坦GDP的约4.5%，凸显财政对短期债务的依赖加剧。高利率环境虽有助于抑制通胀（当前CPI同比为28.3%），但可能压制私营部门投资，并增加债务偿还负担——仅利息支出已占联邦税收的45%以上。SBP若维持紧缩立场，短期内卢比汇率或承压，但有助于稳定国际收支。总体而言，此次拍卖反映了巴基斯坦在内外失衡下“以高成本换流动性”的无奈选择，电信行业需警惕利率传导带来的成本上升与需求放缓风险。"
  },
  {
    "source": "Profit.pk",
    "title": "Every Rupee Transferred Through Bisp Generates Rs234 In Household Income Study Finds",

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlightText(text) {
  if (!text) return '';
  return text.split(/\n\n+/).map(para =>
    '<p>' + esc(para).replace(/【([^】]+)】/g,
      '<span class="key-highlight">$1</span>') + '</p>'
  ).join('');
}

function renderCalendar() {
  const cal = document.getElementById('newsCalendar');

  if (!NEWS_DATA.length) {
    cal.innerHTML = '<div class="no-news">暂无资讯，每日自动抓取更新</div>';
    return;
  }

  // Group by YYYY-MM → DD
  const byMonth = {};
  NEWS_DATA.forEach(item => {
    const ym = item.date.slice(0, 7);
    const dd = item.date.slice(8, 10);
    if (!byMonth[ym]) byMonth[ym] = {};
    if (!byMonth[ym][dd]) byMonth[ym][dd] = [];
    byMonth[ym][dd].push(item);
  });

  const now = new Date();
  const currentYM = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const months = Object.keys(byMonth).sort().reverse();

  months.forEach(ym => {
    const isCurrentMonth = ym === currentYM;
    const [year, month] = ym.split('-');
    const monthLabel = `${year}年${parseInt(month)}月`;
    const dayMap = byMonth[ym];
    const totalItems = Object.values(dayMap).reduce((s, a) => s + a.length, 0);

    const block = document.createElement('div');
    block.className = 'month-block';

    // Month header
    const header = document.createElement('div');
    header.className = 'month-header';
    header.innerHTML = `
      <span class="month-toggle-icon">${isCurrentMonth ? '▼' : '▶'}</span>
      <span>${monthLabel}</span>
      <span class="month-count">${totalItems} 条</span>
      <span class="month-hint">${isCurrentMonth ? '当月' : '点击展开'}</span>
    `;

    // Month content
    const content = document.createElement('div');
    content.className = 'month-content' + (isCurrentMonth ? '' : ' collapsed');

    if (isCurrentMonth) {
      // Show all days from today down to 1st
      for (let d = now.getDate(); d >= 1; d--) {
        const dd = String(d).padStart(2, '0');
        content.appendChild(buildDayRow(dd, month, year, dayMap[dd] || [], true));
      }
    } else {
      // Only show days with news
      Object.keys(dayMap).sort().reverse().forEach(dd => {
        content.appendChild(buildDayRow(dd, month, year, dayMap[dd], false));
      });
    }

    header.addEventListener('click', () => {
      const nowCollapsed = content.classList.toggle('collapsed');
      header.querySelector('.month-toggle-icon').textContent = nowCollapsed ? '▶' : '▼';
      header.querySelector('.month-hint').textContent = nowCollapsed ? '点击展开' : (isCurrentMonth ? '当月' : '');
    });

    block.appendChild(header);
    block.appendChild(content);
    cal.appendChild(block);
  });
}

function buildDayRow(dd, month, year, items, showIfEmpty) {
  const row = document.createElement('div');
  row.className = 'day-row';

  const label = document.createElement('div');
  label.className = 'day-label' + (items.length ? ' has-news' : '');
  label.textContent = `${parseInt(month)}月${parseInt(dd)}日`;
  row.appendChild(label);

  const itemsDiv = document.createElement('div');
  itemsDiv.className = 'day-items';

  if (items.length) {
    items.forEach(item => itemsDiv.appendChild(buildNewsItem(item)));
  } else if (showIfEmpty) {
    const hr = document.createElement('hr');
    hr.className = 'day-divider';
    itemsDiv.appendChild(hr);
  }

  row.appendChild(itemsDiv);
  return row;
}

function buildNewsItem(item) {
  const color = SOURCE_CONFIG[item.source] || '#6b7280';
  const div = document.createElement('div');
  div.className = 'news-item';
  div.style.borderLeftColor = color;
  div.style.setProperty('--source-color', color);
  div.innerHTML = `
    <div class="news-item-header">
      <span class="source-tag" style="background:${color}">${esc(item.source)}</span>
      <a class="news-title" href="${esc(item.url)}" target="_blank" rel="noopener noreferrer">${esc(item.title)}</a>
    </div>
    ${item.summary_zh ? `<div class="news-summary">${highlightText(item.summary_zh)}</div>` : ''}
  `;
  return div;
}

document.getElementById('updateDate').textContent =
  new Date().toLocaleDateString('zh-CN', { year:'numeric', month:'long', day:'numeric' });

renderCalendar();
